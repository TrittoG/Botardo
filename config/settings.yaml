tools:
  yt_dlp_bin: "yt-dlp" # en Windows tambien puede ser "yt-dlp.exe" o ruta completa
  ffmpeg_bin: "ffmpeg" # en Windows tambien puede ser "ffmpeg.exe" o ruta completa

paths:
  urls_file: "input/urls.txt"
  downloads_dir: "output/downloads"
  processed_dir: "output/processed"
  ready_dir: "output/ready_to_upload"
  metadata_csv: "output/metadata/titles.csv"
  state_file: "state/processed_urls.json"

video:
  target_width: 1080
  target_height: 1920
  reframe_mode: "crop_center" # opciones: crop_center | blur_background
  crf: 22
  preset: "medium"
  audio_bitrate: "128k"

overlay:
  enabled: true
  max_chars: 90
  wrap_width: 24
  font_file: "" # ruta opcional absoluta a .ttf (ej Windows: C:/Windows/Fonts/arial.ttf)
  font_size: 58
  font_color: "white"
  box: true
  box_color: "black@0.45"
  box_border: 16
  x_expr: "(w-text_w)/2"
  y_expr: "h*0.08"

titles:
  suggestions_count: 3
  max_length: 95
  hashtags:
    - "#shorts"
    - "#viral"
    - "#tiktok"

processing:
  skip_if_processed: true
