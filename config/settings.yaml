tools:
  # ruta absoluta al ejecutable yt-dlp instalado por winget; se puede
  # ajustar si lo mueves a otra carpeta o si prefieres instalarlo en PATH.
  yt_dlp_bin: "C:/Users/Giuli/AppData/Local/Microsoft/WinGet/Packages/yt-dlp.yt-dlp_Microsoft.Winget.Source_8wekyb3d8bbwe/yt-dlp.exe"
  ffmpeg_bin: "ffmpeg" # en Windows tambien puede ser "ffmpeg.exe" o ruta completa

paths:
  urls_file: "input/urls.txt"
  downloads_dir: "output/downloads"
  processed_dir: "output/processed"
  ready_dir: "output/ready_to_upload"
  metadata_csv: "output/metadata/titles.csv"
  state_file: "state/processed_urls.json"

video:
  target_width: 1080
  target_height: 1920
  reframe_mode: "crop_center" # opciones: crop_center | blur_background
  crop_scale: 1.0 # Factor de zoom para crop_center (0.5-1.0): 1.0=crop completo, valores menores muestran más contenido lateral con barras negras
  crf: 22
  preset: "medium"
  audio_bitrate: "128k"

overlay:
  enabled: true
  max_chars: 90
  wrap_width: 24
  font_file: "" # ruta opcional absoluta a .ttf (ej Windows: C:/Windows/Fonts/arial.ttf)
  font_size: 58
  font_color: "white"
  box: true
  box_color: "black@0.45"
  box_border: 16
  x_expr: "(w-text_w)/2"
  y_expr: "h*0.08"

titles:
  suggestions_count: 3
  max_length: 95
  hashtags:
    - "#shorts"
    - "#viral"
    - "#tiktok"

processing:
  skip_if_processed: true
